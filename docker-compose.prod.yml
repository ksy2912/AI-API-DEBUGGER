services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: apidebug
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apidebug}
      POSTGRES_DB: apidebug
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apidebug -d apidebug"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://apidebug:${POSTGRES_PASSWORD:-apidebug}@db:5432/apidebug
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_SITE_URL: ${PUBLIC_URL:-http://localhost}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LLM_ENABLED: "true"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      RAG_ENABLED: "true"
      RAG_TOP_K: "5"
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://apidebug:${POSTGRES_PASSWORD:-apidebug}@db:5432/apidebug
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped

  beat:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://apidebug:${POSTGRES_PASSWORD:-apidebug}@db:5432/apidebug
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ""
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
