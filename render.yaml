# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect https://github.com/ksy2912/AI-API-DEBUGGER in Render Dashboard → New Blueprint

databases:
  - name: apidebug-db
    databaseName: apidebug
    user: apidebug
    plan: free

services:
  - type: redis
    name: apidebug-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: ai-api-debugger-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: apidebug-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: apidebug-redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_SITE_URL
        fromService:
          type: web
          name: ai-api-debugger-api
          property: host
      - key: LLM_MODEL
        value: openai/gpt-4o-mini
      - key: LLM_ENABLED
        value: "true"
      - key: EMBEDDING_MODEL
        value: openai/text-embedding-3-small
      - key: RAG_ENABLED
        value: "false"
      - key: RAG_TOP_K
        value: "5"
      - key: DEBUG
        value: "false"

  - type: worker
    name: ai-api-debugger-worker
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.celery_app worker --beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        fromDatabase:
          name: apidebug-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: apidebug-redis
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false

  - type: web
    name: ai-api-debugger-frontend
    runtime: static
    rootDir: frontend
    buildCommand: bash scripts/render-build.sh
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-api-debugger-api
          property: host
