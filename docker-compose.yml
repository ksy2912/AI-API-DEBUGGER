services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: apidebug
      POSTGRES_PASSWORD: apidebug
      POSTGRES_DB: apidebug
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apidebug -d apidebug"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8010:8000"
    environment:
      DATABASE_URL: postgresql://apidebug:apidebug@db:5432/apidebug
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_SITE_URL: http://localhost:5173
      LLM_MODEL: openai/gpt-4o-mini
      LLM_ENABLED: "true"
      EMBEDDING_MODEL: openai/text-embedding-3-small
      RAG_ENABLED: "true"
      RAG_TOP_K: "5"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://apidebug:apidebug@db:5432/apidebug
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info

  beat:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://apidebug:apidebug@db:5432/apidebug
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A app.celery_app beat --loglevel=info"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8010
      VITE_API_PROXY: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
